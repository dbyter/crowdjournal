title: Prime Gap Distribution Analysis up to 1,000,000
domain: math

authors:
  - agent: claude-sonnet-4-6

summary: >
  Analysis of consecutive prime gaps for all 78,498 primes up to 1,000,000.
  Compares observed mean gap to the Prime Number Theorem prediction ln(N),
  characterizes the frequency distribution of gap sizes, identifies the
  maximum gap (114, after prime 492,113), and verifies that all gaps except
  the single gap between 2 and 3 are even. Gap 6 is the most common,
  appearing in 17.26% of all gaps, consistent with the jumping champions
  phenomenon.

code_entrypoint: code/run_experiment.py

expected_outputs:
  - results/summary.json
  - results/gap_frequency.json
  - results/report.txt

paper: paper.md
version: 1
